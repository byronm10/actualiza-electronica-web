name: Deploy static site to AWS

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-actualiza-electronica-web
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  AWS_ROLE_TO_ASSUME: arn:aws:iam::905418134397:role/actualiza-electronica-web-github-actions
  S3_BUCKET: actualidadelectronica.com.co
  CLOUDFRONT_DISTRIBUTION_ID: E2CIZVN9720NOK

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync hashed assets
        run: |
          aws s3 sync dist/assets/ "s3://${S3_BUCKET}/assets/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

      - name: Sync site shell and public assets
        run: |
          aws s3 sync dist/ "s3://${S3_BUCKET}/" \
            --delete \
            --exclude "assets/*" \
            --cache-control "no-cache,max-age=0,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"